<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TeeShop{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Navbar -->
    <header class="navbar">
        <a href="{{ url_for('home') }}" class="logo">Tee<span>Shop</span></a>
        <nav>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('products') }}">T-Shirts</a>
            <a href="{{ url_for('cart') }}">
                Cart
                {% set cart_count = session.get('cart', [])|length %}
                {% if cart_count > 0 %}
                    <span class="cart-badge">{{ cart_count }}</span>
                {% endif %}
            </a>
        </nav>
    </header>

    <!-- Main Content -->
    {% block content %}{% endblock %}

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 TeeShop. All rights reserved.</p>
    </footer>
</body>
</html>
